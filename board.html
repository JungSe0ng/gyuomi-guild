<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - 귀요미 길드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f5f9;
            --white: #ffffff;
            --primary: #7c5cbf;
            --primary-light: #9b7fd4;
            --primary-soft: #ede8f8;
            --secondary: #e8609a;
            --secondary-soft: #fde8f2;
            --grad: linear-gradient(135deg, #7c5cbf, #e8609a);
            --grad-soft: linear-gradient(135deg, #ede8f8, #fde8f2);
            --text: #1a1a2e;
            --text-sub: #5a5a7a;
            --text-muted: #9898b8;
            --border: #e8e8f0;
            --shadow-md: 0 4px 20px rgba(124,92,191,0.10);
            --sidebar-w: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ───── 사이드바 ───── */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        }

        .sidebar-logo {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
        }

        .logo-wrap { display: flex; align-items: center; gap: 10px; }

        .logo-icon {
            width: 36px; height: 36px;
            background: var(--grad);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1em; flex-shrink: 0;
        }

        .logo-name { font-size: 0.95em; font-weight: 800; color: var(--primary); line-height: 1.2; }
        .logo-sub  { font-size: 0.68em; color: var(--text-muted); font-weight: 400; }

        .sidebar-user {
            margin: 14px 12px;
            padding: 12px 14px;
            background: var(--primary-soft);
            border-radius: 12px;
            display: flex; align-items: center; gap: 10px;
        }

        .user-avatar {
            width: 32px; height: 32px;
            background: var(--grad);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85em; flex-shrink: 0;
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 0.85em; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.68em; color: var(--primary); font-weight: 600; margin-top: 1px; }

        .logout-btn {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.8em; padding: 4px 6px;
            border-radius: 6px; transition: color 0.18s;
        }
        .logout-btn:hover { color: var(--secondary); }

        .sidebar-nav { flex: 1; padding: 8px 12px; overflow-y: auto; }

        .nav-label {
            font-size: 0.62em; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-muted); padding: 14px 10px 6px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 10px;
            font-size: 0.875em; font-weight: 600;
            color: var(--text-sub); text-decoration: none;
            transition: all 0.18s; margin-bottom: 2px;
        }
        .nav-item:hover { background: var(--bg); color: var(--primary); }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); }

        .nav-icon { font-size: 1em; width: 20px; text-align: center; flex-shrink: 0; }

        .nav-badge {
            margin-left: auto; font-size: 0.68em; font-weight: 700;
            padding: 2px 7px; border-radius: 20px;
            background: var(--primary-soft); color: var(--primary);
        }
        .nav-badge.pink { background: var(--secondary-soft); color: var(--secondary); }
        .nav-badge.teal { background: #e6f7f5; color: #2a9d8f; }

        .sidebar-bottom { padding: 12px; border-top: 1px solid var(--border); }

        .admin-link {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 10px;
            font-size: 0.875em; font-weight: 600;
            color: var(--secondary); text-decoration: none;
            transition: background 0.18s;
            background: var(--secondary-soft);
        }
        .admin-link:hover { background: #fbd5e8; }

        /* ───── 메인 ───── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .topbar {
            height: 56px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }

        .topbar-title { font-size: 0.9em; font-weight: 700; color: var(--text); }
        .topbar-date  { font-size: 0.78em; color: var(--text-muted); }

        .guild-chip {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px;
            background: var(--primary-soft); border-radius: 20px;
            font-size: 0.78em; font-weight: 700; color: var(--primary);
        }

        /* ───── 콘텐츠 ───── */
        .content { padding: 28px 32px; flex: 1; }

        /* 페이지 헤더 */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 22px;
        }

        .page-header-left h1 { font-size: 1.3em; font-weight: 800; color: var(--text); }
        .page-header-left p  { font-size: 0.8em; color: var(--text-muted); margin-top: 3px; }

        .btn-write {
            display: flex; align-items: center; gap: 6px;
            padding: 9px 18px;
            background: var(--grad);
            color: white; border: none; border-radius: 10px;
            font-size: 0.85em; font-weight: 700;
            cursor: pointer; transition: opacity 0.18s;
            text-decoration: none;
        }
        .btn-write:hover { opacity: 0.88; }

        /* 카테고리 탭 */
        .cat-tabs {
            display: flex; gap: 6px;
            margin-bottom: 18px;
        }

        .cat-tab {
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 0.84em; font-weight: 700;
            cursor: pointer; border: none;
            transition: all 0.18s;
            background: var(--white);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .cat-tab.active {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: var(--primary-soft);
        }
        .cat-tab:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); }

        /* 게시글 목록 */
        .board-panel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .board-table-head {
            display: grid;
            grid-template-columns: 60px 1fr 90px 100px 70px;
            padding: 11px 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-size: 0.75em; font-weight: 700;
            color: var(--text-muted);
        }

        .post-row {
            display: grid;
            grid-template-columns: 60px 1fr 90px 100px 70px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .post-row:last-child { border-bottom: none; }
        .post-row:hover { background: #fafafa; }

        .post-num { font-size: 0.78em; color: var(--text-muted); text-align: center; }

        .post-title-wrap { display: flex; align-items: center; gap: 8px; }

        .notice-badge {
            font-size: 0.65em; font-weight: 700;
            padding: 2px 7px; border-radius: 6px;
            background: var(--secondary-soft); color: var(--secondary);
            flex-shrink: 0;
        }

        .free-badge {
            font-size: 0.65em; font-weight: 700;
            padding: 2px 7px; border-radius: 6px;
            background: var(--primary-soft); color: var(--primary);
            flex-shrink: 0;
        }

        .post-title {
            font-size: 0.88em; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .post-author { font-size: 0.8em; color: var(--text-sub); }
        .post-date   { font-size: 0.76em; color: var(--text-muted); }
        .post-views  { font-size: 0.76em; color: var(--text-muted); text-align: center; }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85em;
        }
        .empty-state .ei { font-size: 2.5em; margin-bottom: 12px; }

        /* ───── 모달: 글쓰기 / 글 상세 ───── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 300;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 20px;
            width: 100%; max-width: 680px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

        .modal-header {
            padding: 22px 26px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: var(--white); z-index: 1;
        }
        .modal-title { font-size: 1em; font-weight: 800; color: var(--text); }

        .modal-close {
            background: none; border: none;
            font-size: 1.3em; color: var(--text-muted);
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
            transition: color 0.15s;
        }
        .modal-close:hover { color: var(--secondary); }

        .modal-body { padding: 22px 26px; }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block; margin-bottom: 7px;
            font-size: 0.82em; font-weight: 700; color: var(--text-sub);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 11px 14px;
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 0.88em; font-family: inherit;
            color: var(--text); background: var(--white);
            transition: border-color 0.18s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .form-textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
        .form-select { cursor: pointer; }

        .modal-footer {
            padding: 16px 26px 22px;
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .btn-cancel {
            padding: 9px 20px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--white);
            color: var(--text-muted); font-size: 0.85em; font-weight: 600;
            cursor: pointer; transition: all 0.18s;
        }
        .btn-cancel:hover { border-color: var(--secondary); color: var(--secondary); }

        .btn-submit {
            padding: 9px 22px; border-radius: 10px;
            background: var(--grad); color: white;
            border: none; font-size: 0.85em; font-weight: 700;
            cursor: pointer; transition: opacity 0.18s;
        }
        .btn-submit:hover { opacity: 0.88; }

        /* 상세 뷰 */
        .detail-meta {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 18px; flex-wrap: wrap;
        }
        .detail-author {
            display: flex; align-items: center; gap: 7px;
            font-size: 0.84em; font-weight: 600; color: var(--text-sub);
        }
        .detail-author-ava {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--grad);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75em;
        }
        .detail-date  { font-size: 0.76em; color: var(--text-muted); margin-left: auto; }
        .detail-views { font-size: 0.76em; color: var(--text-muted); }

        .detail-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

        .detail-body {
            font-size: 0.9em; color: var(--text-sub);
            line-height: 1.85; white-space: pre-wrap; word-break: break-word;
        }

        .detail-actions {
            display: flex; justify-content: flex-end; gap: 8px;
            margin-top: 20px; padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-edit {
            padding: 7px 16px; border-radius: 8px;
            background: var(--primary-soft); color: var(--primary);
            border: none; font-size: 0.8em; font-weight: 700;
            cursor: pointer; transition: background 0.18s;
        }
        .btn-edit:hover { background: #ddd4f5; }

        .btn-del {
            padding: 7px 16px; border-radius: 8px;
            background: #fdeaea; color: #d94f4f;
            border: none; font-size: 0.8em; font-weight: 700;
            cursor: pointer; transition: background 0.18s;
        }
        .btn-del:hover { background: #fbd5d5; }

        /* 모바일 */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.25); z-index: 90;
        }
        .sidebar-overlay.open { display: block; }

        .hamburger {
            display: none; position: fixed; top: 14px; left: 14px;
            z-index: 200; background: var(--white);
            border: 1px solid var(--border); border-radius: 9px;
            padding: 9px; cursor: pointer;
            flex-direction: column; gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .hamburger span { display: block; width: 17px; height: 2px; background: var(--text-sub); border-radius: 2px; }

        @media (max-width: 860px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.12); }
            .main { margin-left: 0; }
            .hamburger { display: flex; }
            .topbar { padding: 0 16px 0 52px; }
            .content { padding: 20px 16px; }
            .board-table-head { grid-template-columns: 50px 1fr 80px; }
            .board-table-head .th-date,
            .board-table-head .th-views { display: none; }
            .post-row { grid-template-columns: 50px 1fr 80px; }
            .post-date, .post-views { display: none; }
            .modal { max-width: 96vw; border-radius: 16px; }
        }

        .fade-up { opacity: 0; transform: translateY(14px); animation: fu 0.4s ease forwards; }
        @keyframes fu { to { opacity:1; transform:none; } }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.12s; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="hamburger" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
</button>

<!-- ───── 사이드바 ───── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-wrap">
            <div class="logo-icon">🐰</div>
            <div>
                <div class="logo-name">귀요미 길드</div>
                <div class="logo-sub">세븐나이츠 공략집</div>
            </div>
        </div>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar">🌸</div>
        <div class="user-info">
            <div class="user-name" id="sidebarName">로딩중...</div>
            <div class="user-role" id="sidebarRole">멤버</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="로그아웃">↩</button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-label">메뉴</div>
        <a href="main.html" class="nav-item">
            <span class="nav-icon">🏠</span> 홈
        </a>

        <div class="nav-label">공략</div>
        <a href="guildwar.html" class="nav-item">
            <span class="nav-icon">⚔️</span> 길드전
        </a>
        <a href="siege.html" class="nav-item">
            <span class="nav-icon">🏰</span> 공성전
        </a>
        <a href="expedition.html" class="nav-item">
            <span class="nav-icon">🌟</span> 강림원정대
        </a>

        <div class="nav-label">커뮤니티</div>
        <a href="board.html" class="nav-item active">
            <span class="nav-icon">📋</span> 게시판
        </a>
    </nav>

    <div class="sidebar-bottom" id="adminSection" style="display:none;">
        <a href="admin.html" class="admin-link">
            <span>👑</span> 회원 관리
        </a>
    </div>
</aside>

<!-- ───── 메인 ───── -->
<div class="main">
    <div class="topbar">
        <div>
            <div class="topbar-title">게시판</div>
            <div class="topbar-date" id="topDate"></div>
        </div>
        <div class="guild-chip">🐰 귀요미 길드</div>
    </div>

    <div class="content">

        <!-- 페이지 헤더 -->
        <div class="page-header fade-up d1">
            <div class="page-header-left">
                <h1>📋 게시판</h1>
                <p>길드원들과 자유롭게 소통해요</p>
            </div>
            <button class="btn-write" id="writeBtn" onclick="openWriteModal()">✏️ 글쓰기</button>
        </div>

        <!-- 카테고리 탭 -->
        <div class="cat-tabs fade-up d1">
            <button class="cat-tab active" id="tab-all"    onclick="switchTab('all')">전체</button>
            <button class="cat-tab"        id="tab-notice" onclick="switchTab('notice')">📢 공지</button>
            <button class="cat-tab"        id="tab-free"   onclick="switchTab('free')">💬 자유</button>
        </div>

        <!-- 게시글 목록 -->
        <div class="board-panel fade-up d2">
            <div class="board-table-head">
                <div style="text-align:center;">번호</div>
                <div>제목</div>
                <div>작성자</div>
                <div class="th-date">날짜</div>
                <div class="th-views" style="text-align:center;">조회</div>
            </div>
            <div id="postList">
                <div class="empty-state">
                    <div class="ei">📭</div>
                    <div>로딩중...</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ───── 글쓰기 모달 ───── -->
<div class="modal-overlay" id="writeModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="writeModalTitle">✏️ 글쓰기</div>
            <button class="modal-close" onclick="closeWriteModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">카테고리</label>
                <select class="form-select" id="postCategory">
                    <option value="free">💬 자유</option>
                    <option value="notice" id="noticeOption">📢 공지 (관리자 전용)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">제목</label>
                <input class="form-input" id="postTitle" type="text" placeholder="제목을 입력하세요" maxlength="100">
            </div>
            <div class="form-group">
                <label class="form-label">내용</label>
                <textarea class="form-textarea" id="postContent" placeholder="내용을 입력하세요"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeWriteModal()">취소</button>
            <button class="btn-submit" onclick="submitPost()">등록하기</button>
        </div>
    </div>
</div>

<!-- ───── 글 상세 모달 ───── -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="detailCategory"></div>
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
        </div>
        <div class="modal-body">
            <div style="font-size:1.1em;font-weight:800;color:var(--text);margin-bottom:14px;" id="detailTitle"></div>
            <div class="detail-meta">
                <div class="detail-author">
                    <div class="detail-author-ava" id="detailAuthorAva">🌸</div>
                    <span id="detailAuthor"></span>
                </div>
                <span class="detail-views" id="detailViews"></span>
                <span class="detail-date" id="detailDate"></span>
            </div>
            <hr class="detail-divider">
            <div class="detail-body" id="detailBody"></div>
            <div class="detail-actions" id="detailActions"></div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import {
        getFirestore, collection, addDoc, getDocs, getDoc,
        doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, increment
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAIuUCCt5RfN5Jv9THi3-OAn1F4xJ7TH4U",
        authDomain: "gyuomi-guild.firebaseapp.com",
        projectId: "gyuomi-guild",
        storageBucket: "gyuomi-guild.firebasestorage.app",
        messagingSenderId: "43293575259",
        appId: "1:43293575259:web:2ac8bd0dfecda6a2be177e"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ✅ 미리보기 모드 (로컬 테스트용 — 배포 시 false로 변경)
    const PREVIEW = false;
    const PREVIEW_USER = { uid: 'preview', nickname: '미리보기', role: 'admin' };

    // 날짜
    const days = ['일','월','화','수','목','금','토'];
    const now  = new Date();
    document.getElementById('topDate').textContent =
        `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

    let me = null;
    let allPosts = [];
    let currentTab = 'all';
    let editingPostId = null;

    const emojis = ['🌸','🌼','🌺','🍀','⭐','🌙','🎀','🦋','🌈','🎯','🌻','🍒'];

    // ── 인증 ──
    if (PREVIEW) {
        me = PREVIEW_USER;
        document.getElementById('sidebarName').textContent = me.nickname;
        document.getElementById('sidebarRole').textContent = '👑 관리자';
        document.getElementById('adminSection').style.display = '';
        allPosts = [];
        renderPosts();
    } else {
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { await signOut(auth); window.location.href = 'index.html'; return; }
        const data = snap.data();
        if (data.role === 'pending') { await signOut(auth); window.location.href = 'index.html'; return; }

        me = { uid: user.uid, ...data };

        document.getElementById('sidebarName').textContent = me.nickname;
        document.getElementById('sidebarRole').textContent = me.role === 'admin' ? '👑 관리자' : '👤 멤버';

        if (me.role === 'admin') {
            document.getElementById('adminSection').style.display = '';
        } else {
            // 일반 멤버는 공지 옵션 숨김
            document.getElementById('noticeOption').style.display = 'none';
        }

        loadPosts();
    });
    }

    // ── 게시글 불러오기 ──
    async function loadPosts() {
        try {
            const q = query(collection(db, 'board'), orderBy('createdAt', 'desc'));
            const snap = await getDocs(q);
            allPosts = [];
            snap.forEach(d => allPosts.push({ id: d.id, ...d.data() }));
            renderPosts();
        } catch(e) {
            console.error(e);
            document.getElementById('postList').innerHTML =
                '<div class="empty-state"><div class="ei">⚠️</div><div>불러오기 실패</div></div>';
        }
    }

    // ── 렌더링 ──
    function renderPosts() {
        const filtered = currentTab === 'all'
            ? allPosts
            : allPosts.filter(p => p.category === currentTab);

        const el = document.getElementById('postList');

        if (!filtered.length) {
            el.innerHTML = '<div class="empty-state"><div class="ei">📭</div><div>게시글이 없습니다.</div></div>';
            return;
        }

        // 공지를 항상 위로
        const sorted = [
            ...filtered.filter(p => p.category === 'notice'),
            ...filtered.filter(p => p.category !== 'notice'),
        ];

        el.innerHTML = sorted.map((p, i) => {
            const badge = p.category === 'notice'
                ? '<span class="notice-badge">공지</span>'
                : '<span class="free-badge">자유</span>';
            const date = p.createdAt?.toDate
                ? formatDate(p.createdAt.toDate())
                : '-';
            const num = p.category === 'notice' ? '📌' : (i + 1);
            return `
                <div class="post-row" onclick="openDetail('${p.id}')">
                    <div class="post-num">${num}</div>
                    <div class="post-title-wrap">
                        ${badge}
                        <span class="post-title">${escHtml(p.title)}</span>
                    </div>
                    <div class="post-author">${escHtml(p.authorName)}</div>
                    <div class="post-date">${date}</div>
                    <div class="post-views">👁 ${p.views || 0}</div>
                </div>
            `;
        }).join('');
    }

    // ── 탭 전환 ──
    window.switchTab = function(tab) {
        currentTab = tab;
        ['all','notice','free'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
        });
        renderPosts();
    };

    // ── 글쓰기 모달 ──
    window.openWriteModal = function(postId = null) {
        editingPostId = postId;
        const modal = document.getElementById('writeModal');

        if (postId) {
            const p = allPosts.find(x => x.id === postId);
            document.getElementById('writeModalTitle').textContent = '✏️ 글 수정';
            document.getElementById('postCategory').value = p.category;
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postContent').value = p.content;
        } else {
            document.getElementById('writeModalTitle').textContent = '✏️ 글쓰기';
            document.getElementById('postCategory').value = 'free';
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
        }

        modal.classList.add('open');
    };

    window.closeWriteModal = function() {
        document.getElementById('writeModal').classList.remove('open');
        editingPostId = null;
    };

    // ── 글 등록/수정 ──
    window.submitPost = async function() {
        const category = document.getElementById('postCategory').value;
        const title    = document.getElementById('postTitle').value.trim();
        const content  = document.getElementById('postContent').value.trim();

        if (!title) { alert('제목을 입력해주세요.'); return; }
        if (!content) { alert('내용을 입력해주세요.'); return; }

        // 공지는 관리자만
        if (category === 'notice' && me.role !== 'admin') {
            alert('공지는 관리자만 작성할 수 있습니다.');
            return;
        }

        try {
            if (editingPostId) {
                await updateDoc(doc(db, 'board', editingPostId), { category, title, content, updatedAt: serverTimestamp() });
                alert('수정되었습니다.');
            } else {
                await addDoc(collection(db, 'board'), {
                    category, title, content,
                    authorUid: me.uid,
                    authorName: me.nickname,
                    createdAt: serverTimestamp(),
                    views: 0,
                });
                alert('등록되었습니다.');
            }
            closeWriteModal();
            closeDetailModal();
            loadPosts();
        } catch(e) {
            console.error(e);
            alert('저장 중 오류가 발생했습니다.');
        }
    };

    // ── 상세 보기 ──
    window.openDetail = async function(postId) {
        const p = allPosts.find(x => x.id === postId);
        if (!p) return;

        // 조회수 증가 (본인 제외)
        if (p.authorUid !== me.uid) {
            try {
                await updateDoc(doc(db, 'board', postId), { views: increment(1) });
                p.views = (p.views || 0) + 1;
            } catch(e) {}
        }

        const catLabel = p.category === 'notice'
            ? '<span class="notice-badge">📢 공지</span>'
            : '<span class="free-badge">💬 자유</span>';

        const date = p.createdAt?.toDate ? formatDate(p.createdAt.toDate()) : '-';
        const emojiIdx = Math.abs(hashCode(p.authorUid)) % emojis.length;

        document.getElementById('detailCategory').innerHTML = catLabel;
        document.getElementById('detailTitle').textContent  = p.title;
        document.getElementById('detailAuthorAva').textContent = emojis[emojiIdx];
        document.getElementById('detailAuthor').textContent = p.authorName;
        document.getElementById('detailViews').textContent  = `👁 ${p.views || 0}`;
        document.getElementById('detailDate').textContent   = date;
        document.getElementById('detailBody').textContent   = p.content;

        // 수정/삭제 버튼 (작성자 or 관리자)
        const canEdit = p.authorUid === me.uid;
        const canDelete = p.authorUid === me.uid || me.role === 'admin';
        let actions = '';
        if (canEdit)   actions += `<button class="btn-edit" onclick="closeDetailModal();openWriteModal('${p.id}')">수정</button>`;
        if (canDelete) actions += `<button class="btn-del" onclick="deletePost('${p.id}')">삭제</button>`;
        document.getElementById('detailActions').innerHTML = actions;

        document.getElementById('detailModal').classList.add('open');
    };

    window.closeDetailModal = function() {
        document.getElementById('detailModal').classList.remove('open');
    };

    // ── 삭제 ──
    window.deletePost = async function(postId) {
        if (!confirm('게시글을 삭제하시겠습니까?')) return;
        try {
            await deleteDoc(doc(db, 'board', postId));
            alert('삭제되었습니다.');
            closeDetailModal();
            loadPosts();
        } catch(e) {
            alert('삭제 중 오류가 발생했습니다.');
        }
    };

    // ── 로그아웃 ──
    window.handleLogout = async () => {
        if (PREVIEW) { window.location.href = 'index.html'; return; }
        if (!confirm('로그아웃 하시겠습니까?')) return;
        await signOut(auth);
        window.location.href = 'index.html';
    };

    // ── 유틸 ──
    function formatDate(d) {
        const today = new Date();
        const isToday = d.toDateString() === today.toDateString();
        if (isToday) return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        return `${d.getMonth()+1}.${d.getDate()}`;
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function hashCode(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
        return h;
    }
</script>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
    }

    // 모달 외부 클릭 닫기
    document.getElementById('writeModal').addEventListener('click', function(e) {
        if (e.target === this) window.closeWriteModal();
    });
    document.getElementById('detailModal').addEventListener('click', function(e) {
        if (e.target === this) window.closeDetailModal();
    });
</script>

</body>
</html>
