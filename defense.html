<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방어 공략 - 귀요미 길드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f5f9;
            --white: #ffffff;
            --primary: #7c5cbf;
            --primary-soft: #ede8f8;
            --secondary: #e8609a;
            --secondary-soft: #fde8f2;
            --teal: #2a9d8f;
            --teal-soft: #e6f7f5;
            --gold: #b8860b;
            --gold-soft: #fffbe6;
            --grad: linear-gradient(135deg, #7c5cbf, #e8609a);
            --text: #1a1a2e;
            --text-sub: #5a5a7a;
            --text-muted: #9898b8;
            --border: #e8e8f0;
            --shadow-md: 0 4px 20px rgba(124,92,191,0.10);
            --sidebar-w: 240px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

        /* ── 사이드바 ── */
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--white); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 100; transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
        .sidebar-logo { padding: 24px 20px 18px; border-bottom: 1px solid var(--border); }
        .logo-wrap { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1em; flex-shrink: 0; }
        .logo-name { font-size: 0.95em; font-weight: 800; color: var(--primary); }
        .logo-sub  { font-size: 0.68em; color: var(--text-muted); }
        .sidebar-user { margin: 14px 12px; padding: 12px 14px; background: var(--primary-soft); border-radius: 12px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; background: var(--grad); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85em; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 0.85em; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.68em; color: var(--primary); font-weight: 600; margin-top: 1px; }
        .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8em; padding: 4px 6px; border-radius: 6px; }
        .logout-btn:hover { color: var(--secondary); }
        .sidebar-nav { flex: 1; padding: 8px 12px; overflow-y: auto; }
        .nav-label { font-size: 0.62em; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 14px 10px 6px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 0.875em; font-weight: 600; color: var(--text-sub); text-decoration: none; transition: all 0.18s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--bg); color: var(--primary); }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); }
        .nav-icon { font-size: 1em; width: 20px; text-align: center; flex-shrink: 0; }
        .sidebar-bottom { padding: 12px; border-top: 1px solid var(--border); }
        .admin-link { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 0.875em; font-weight: 600; color: var(--secondary); text-decoration: none; background: var(--secondary-soft); }
        .admin-link:hover { background: #fbd5e8; }

        /* ── 메인 ── */
        .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-size: 0.9em; font-weight: 700; }
        .topbar-date  { font-size: 0.78em; color: var(--text-muted); }
        .guild-chip { padding: 5px 12px; background: var(--teal-soft); border-radius: 20px; font-size: 0.78em; font-weight: 700; color: var(--teal); }
        .content { padding: 24px 28px; flex: 1; }

        /* ── 헤더 ── */
        .page-hd { margin-bottom: 20px; }
        .page-hd h1 { font-size: 1.2em; font-weight: 800; }
        .page-hd p  { font-size: 0.78em; color: var(--text-muted); margin-top: 2px; }

        /* ── 탭 ── */
        .main-tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
        .main-tab { padding: 8px 24px; border-radius: 9px; font-size: 0.88em; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.2s; font-family: inherit; }
        .main-tab.active-atk { background: var(--primary-soft); color: var(--primary); }
        .main-tab.active-def { background: var(--teal-soft); color: var(--teal); }

        .sub-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
        .sub-tab { padding: 6px 16px; border-radius: 20px; font-size: 0.82em; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text-muted); transition: all 0.18s; font-family: inherit; }
        .sub-tab.active-def { background: var(--teal-soft); color: var(--teal); border-color: var(--teal-soft); }

        /* ── 폼 레이아웃 ── */
        .form-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }

        /* ── 좌측 패널 ── */
        .left-panel { display: flex; flex-direction: column; gap: 12px; }

        .panel-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .panel-card-title { padding: 11px 14px; font-size: 0.75em; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
        .panel-card-body { padding: 14px; }

        /* 라디오 */
        .radio-group { display: flex; flex-direction: column; gap: 7px; }
        .radio-item { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 9px; border: 1px solid var(--border); cursor: pointer; transition: all 0.18s; font-size: 0.82em; font-weight: 600; }
        .radio-item input[type=radio] { accent-color: var(--teal); }
        .radio-item:has(input:checked) { background: var(--teal-soft); border-color: var(--teal-soft); color: var(--teal); }

        /* 인풋 */
        .f-input, .f-textarea, .f-select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.83em; font-family: inherit; color: var(--text); background: var(--white); transition: border-color 0.18s; }
        .f-input:focus, .f-textarea:focus, .f-select:focus { outline: none; border-color: var(--teal); }
        .f-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
        .f-select { cursor: pointer; }
        .f-label { font-size: 0.73em; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; display: block; }

        /* ── 우측 패널 ── */
        .right-panel { display: flex; flex-direction: column; gap: 14px; }

        /* 팀 섹션 */
        .team-section { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .team-section-hd { padding: 11px 16px; font-size: 0.75em; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .team-section-hd.def-hd { color: var(--teal); }
        .team-slots { padding: 14px 16px; display: flex; gap: 12px; }

        /* 영웅 슬롯 */
        .hero-slot { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .hero-slot-img { width: 72px; height: 72px; border-radius: 12px; border: 2px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative; }
        .hero-slot-img:hover { border-color: var(--teal); background: var(--teal-soft); }
        .hero-slot-img.selected { border: 2px solid var(--teal); box-shadow: 0 0 0 3px rgba(42,157,143,0.15); }
        .hero-slot-img.active-hero { border: 2px solid var(--teal); box-shadow: 0 0 0 4px rgba(42,157,143,0.25); }
        .hero-slot-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .slot-empty { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-muted); font-size: 0.68em; font-weight: 600; }
        .slot-empty .slot-icon { font-size: 1.6em; }
        .hero-slot-name { font-size: 0.72em; font-weight: 700; color: var(--text); text-align: center; min-height: 16px; }
        .hero-slot-btn { font-size: 0.68em; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; transition: all 0.18s; font-family: inherit; }
        .hero-slot-btn:hover { border-color: var(--teal); color: var(--teal); }
        .hero-slot-btn.active-btn { background: var(--teal); color: white; border-color: var(--teal); }

        /* 장비 패널 */
        .equip-panel { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .equip-panel-hd { padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .equip-hero-tabs { display: flex; gap: 4px; }
        .equip-hero-tab { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 8px; font-size: 0.78em; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); transition: all 0.18s; font-family: inherit; }
        .equip-hero-tab img { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
        .equip-hero-tab.active { background: var(--teal-soft); color: var(--teal); border-color: var(--teal-soft); }
        .equip-body { padding: 16px; }
        .equip-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        /* 스킬 */
        .skill-section { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .skill-section-hd { padding: 11px 16px; font-size: 0.75em; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid var(--border); }
        .skill-body { padding: 14px 16px; }
        .skill-selected-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
        .skill-order-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .skill-order-num { font-size: 0.65em; font-weight: 800; color: var(--text-muted); }
        .skill-order-img { width: 52px; height: 52px; border-radius: 10px; border: 2px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.2em; color: var(--text-muted); overflow: hidden; cursor: pointer; transition: all 0.18s; position: relative; }
        .skill-order-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .skill-order-img.filled { border: 2px solid var(--gold); box-shadow: 0 0 0 2px rgba(184,134,11,0.15); }
        .skill-order-img .del-skill { position: absolute; top: -4px; right: -4px; width: 15px; height: 15px; background: #d94f4f; color: white; border-radius: 50%; font-size: 0.6em; border: none; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .skill-order-img:hover .del-skill { display: flex; }
        .skill-arrow { color: var(--text-muted); font-size: 1em; margin-top: 16px; }
        .skill-search { margin-bottom: 10px; }
        .skill-search input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.82em; font-family: inherit; }
        .skill-search input:focus { outline: none; border-color: var(--teal); }
        .skill-grid { display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; padding: 2px; }
        .skill-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
        .skill-item-img { width: 52px; height: 52px; border-radius: 9px; border: 2px solid transparent; overflow: hidden; transition: all 0.18s; background: var(--bg); }
        .skill-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .skill-item-img:hover { border-color: var(--gold); transform: scale(1.06); }
        .skill-item-img.used { opacity: 0.35; pointer-events: none; }
        .skill-item-name { font-size: 0.6em; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px; }

        /* 펫 */
        .pet-section { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .pet-hd { padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .pet-hd-title { font-size: 0.75em; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--teal); }
        .pet-hd-count { font-size: 0.72em; color: var(--text-muted); }
        .pet-body { padding: 14px 16px; }
        .pet-selected-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .pet-slot { width: 56px; height: 56px; border-radius: 10px; border: 2px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.4em; color: var(--text-muted); overflow: hidden; position: relative; cursor: pointer; transition: all 0.18s; }
        .pet-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .pet-slot.filled { border: 2px solid var(--teal); box-shadow: 0 0 0 2px rgba(42,157,143,0.15); }
        .pet-slot .del-pet { position: absolute; top: -4px; right: -4px; width: 15px; height: 15px; background: #d94f4f; color: white; border-radius: 50%; font-size: 0.6em; border: none; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .pet-slot:hover .del-pet { display: flex; }
        .pet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 6px; max-height: 160px; overflow-y: auto; }
        .pet-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
        .pet-item-img { width: 52px; height: 52px; border-radius: 9px; border: 2px solid transparent; overflow: hidden; transition: all 0.18s; background: var(--bg); }
        .pet-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .pet-item-img:hover { border-color: var(--teal); transform: scale(1.06); }
        .pet-item-img.selected { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(42,157,143,0.2); }
        .pet-item-name { font-size: 0.6em; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px; }

        /* 액션 바 */
        .action-bar { display: flex; gap: 10px; margin-bottom: 18px; }
        .search-input { flex: 1; padding: 9px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 0.86em; font-family: inherit; color: var(--text); background: var(--white); }
        .search-input:focus { outline: none; border-color: var(--teal); }
        .btn-add { display: flex; align-items: center; gap: 6px; padding: 9px 18px; background: linear-gradient(135deg, var(--teal), #21867a); color: white; border: none; border-radius: 10px; font-size: 0.85em; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .btn-add:hover { opacity: 0.88; }

        /* 폼 버튼 */
        .form-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 16px; }
        .btn-cancel { padding: 9px 20px; border-radius: 9px; border: 1px solid var(--border); background: var(--white); color: var(--text-muted); font-size: 0.84em; font-weight: 700; cursor: pointer; font-family: inherit; }
        .btn-cancel:hover { border-color: var(--secondary); color: var(--secondary); }
        .btn-submit { padding: 9px 26px; border-radius: 9px; background: linear-gradient(135deg, var(--teal), #21867a); color: white; border: none; font-size: 0.84em; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.18s; }
        .btn-submit:hover { opacity: 0.88; }

        /* 빈 상태 */
        .empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); background: var(--white); border: 1px solid var(--border); border-radius: 14px; }
        .empty-icon { font-size: 2.4em; margin-bottom: 9px; }
        .empty-text { font-size: 0.84em; }

        /* 영웅 선택 모달 */
        .hero-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
        .hero-modal-overlay.open { display: flex; }
        .hero-modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: mIn 0.22s ease; }
        @keyframes mIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .hero-modal-hd { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .hero-modal-hd-title { font-size: 0.92em; font-weight: 800; }
        .hero-modal-close { background: none; border: none; font-size: 1.2em; color: var(--text-muted); cursor: pointer; }
        .hero-modal-search { padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .hero-modal-search input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; font-size: 0.86em; font-family: inherit; }
        .hero-modal-search input:focus { outline: none; border-color: var(--teal); }
        .hero-modal-body { padding: 14px 20px; overflow-y: auto; flex: 1; }
        .hero-grade-title { font-size: 0.68em; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 10px 0 8px; }
        .hero-grade-title:first-child { margin-top: 0; }
        .hero-grid-modal { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; margin-bottom: 4px; }
        .hero-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .hero-item-img { width: 64px; height: 64px; border-radius: 11px; border: 2px solid transparent; overflow: hidden; transition: all 0.18s; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.6em; color: var(--text-muted); text-align: center; }
        .hero-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .hero-item-img:hover { border-color: var(--teal); transform: scale(1.05); box-shadow: 0 4px 12px rgba(42,157,143,0.2); }
        .hero-item-name { font-size: 0.68em; font-weight: 600; color: var(--text); text-align: center; }

        /* 모바일 */
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 90; }
        .sidebar-overlay.open { display: block; }
        .hamburger { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; background: var(--white); border: 1px solid var(--border); border-radius: 9px; padding: 9px; cursor: pointer; flex-direction: column; gap: 4px; }
        .hamburger span { display: block; width: 17px; height: 2px; background: var(--text-sub); border-radius: 2px; }

        @media (max-width: 1100px) { .form-layout { grid-template-columns: 260px 1fr; } }
        @media (max-width: 860px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.12); }
            .main { margin-left: 0; }
            .hamburger { display: flex; }
            .topbar { padding: 0 16px 0 52px; }
            .content { padding: 16px; }
            .form-layout { grid-template-columns: 1fr; }
            .equip-grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>

};
Object.keys(HERO_DATA).forEach(g => HERO_DATA[g].sort((a,b) => a.localeCompare(b,'ko')));

const PET_LIST = ['더지','델로','루','리첼','멜페로','믹','에리','연지','요랑','윈디','유','이린','제브','제오','카람','크리','파이크'];

const SETS = ['선봉장','성기사','암살자','복수자','조율자','수문장','수호자','추적자','주술사'];
const WPN_OPTS = ['약점 공격 확률','치명타 확률','치명타 피해','모든 공격력(%)','모든 공격력','방어력(%)','방어력','생명력(%)','생명력','효과 적중'];
const ARM_OPTS = ['받는 피해 감소','막기 확률','모든 공격력(%)','모든 공격력','방어력(%)','방어력','생명력(%)','생명력','효과 저항'];

// ──────────────────────────────────
// 상태
// ──────────────────────────────────
let defHeroes   = [null, null, null];
let activeDefIdx = 0;
let equipData   = [{}, {}, {}];
let skillOrder  = [null, null, null];
let selectedPets = [null, null, null];
let modalTargetIdx = 0;
let editingDefId = null;
let allDefGuides = [];

// ──────────────────────────────────
// 서브탭 전환
// ──────────────────────────────────
function switchSub(sub) {
    document.getElementById('viewList').style.display = sub === 'list' ? 'block' : 'none';
    document.getElementById('viewForm').style.display = sub === 'form' ? 'block' : 'none';
    document.getElementById('defSubList').className = 'sub-tab' + (sub === 'list' ? ' active-def' : '');
    document.getElementById('defSubForm').className = 'sub-tab' + (sub === 'form' ? ' active-def' : '');
}

// ──────────────────────────────────
// 슬롯 초기화
// ──────────────────────────────────
function initSlots() {
    document.getElementById('defSlots').innerHTML = [0,1,2].map(i => `
        <div class="hero-slot">
            <div class="hero-slot-img" id="defSlot${i}" onclick="openHeroModal(${i})">
                <div class="slot-empty"><span class="slot-icon">🛡️</span><span>선택</span></div>
            </div>
            <div class="hero-slot-name" id="defSlotName${i}"></div>
            <button class="hero-slot-btn" id="defSlotBtn${i}" onclick="setActiveHero(${i})">장비설정</button>
        </div>
    `).join('');
    renderPetGrid();
}

// ──────────────────────────────────
// 영웅 이미지
// ──────────────────────────────────
function heroImg(name) {
    return `<img src="${HERO_IMG_PATH}${name}.webp" alt="${name}"
        onerror="this.parentElement.innerHTML='<span style=\\'font-size:0.65em;color:var(--text-muted);text-align:center;padding:4px;\\'>${name}</span>'">`;
}

// ──────────────────────────────────
// 영웅 선택 모달
// ──────────────────────────────────
function openHeroModal(idx) {
    modalTargetIdx = idx;
    document.getElementById('heroModalTitle').textContent = `방어팀 ${idx+1}번 영웅 선택`;
    document.getElementById('heroSearch').value = '';
    renderHeroModal('');
    document.getElementById('heroModal').classList.add('open');
}

function closeHeroModal() {
    document.getElementById('heroModal').classList.remove('open');
}

function renderHeroModal(q) {
    const lq = q.toLowerCase();
    let html = '';
    Object.entries(HERO_DATA).forEach(([grade, heroes]) => {
        const filtered = q ? heroes.filter(h => h.toLowerCase().includes(lq)) : heroes;
        if (!filtered.length) return;
        html += `<div class="hero-grade-title">${grade}</div><div class="hero-grid-modal">`;
        filtered.forEach(name => {
            html += `<div class="hero-item" onclick="selectHero('${name}')">
                <div class="hero-item-img">${heroImg(name)}</div>
                <div class="hero-item-name">${name}</div>
            </div>`;
        });
        html += `</div>`;
    });
    document.getElementById('heroModalBody').innerHTML = html ||
        '<p style="text-align:center;padding:30px;color:var(--text-muted);font-size:0.84em;">검색 결과 없음</p>';
}

function selectHero(name) {
    const idx = modalTargetIdx;
    defHeroes[idx] = name;

    const slot = document.getElementById(`defSlot${idx}`);
    slot.innerHTML = heroImg(name);
    slot.className = 'hero-slot-img selected';
    document.getElementById(`defSlotName${idx}`).textContent = name;

    setActiveHero(idx);
    renderEquipTabs();
    renderSkillGrid('');
    closeHeroModal();
}

// ──────────────────────────────────
// 활성 영웅 전환
// ──────────────────────────────────
function setActiveHero(idx) {
    if (!defHeroes[idx]) return;
    activeDefIdx = idx;

    [0,1,2].forEach(i => {
        const btn  = document.getElementById(`defSlotBtn${i}`);
        const slot = document.getElementById(`defSlot${i}`);
        if (btn)  btn.className  = 'hero-slot-btn' + (i === idx ? ' active-btn' : '');
        if (slot && defHeroes[i]) slot.className = 'hero-slot-img' + (i === idx ? ' active-hero' : ' selected');
    });

    renderEquipTabs();
    renderEquipBody();
}

// ──────────────────────────────────
// 장비 탭
// ──────────────────────────────────
function renderEquipTabs() {
    document.getElementById('equipHeroTabs').innerHTML = [0,1,2].map(i => {
        const name = defHeroes[i];
        if (!name) return '';
        return `<button class="equip-hero-tab ${i === activeDefIdx ? 'active' : ''}" onclick="setActiveHero(${i})">
            <img src="${HERO_IMG_PATH}${name}.webp" alt="${name}" onerror="this.style.display='none'">
            ${name}
        </button>`;
    }).join('');
}

// ──────────────────────────────────
// 장비 폼 렌더
// ──────────────────────────────────
function renderEquipBody() {
    const name = defHeroes[activeDefIdx];
    if (!name) return;
    const d = equipData[activeDefIdx];

    const selOpts = (opts, key) => opts.map(o => `<option value="${o}" ${d[key]===o?'selected':''}>${o}</option>`).join('');
    const setOpts = SETS.map(s => `<option value="${s}" ${d.set===s?'selected':''}>${s}</option>`).join('');

    document.getElementById('equipBody').innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">
            <div style="width:44px;height:44px;border-radius:10px;overflow:hidden;border:2px solid var(--teal-soft);flex-shrink:0;">
                ${heroImg(name)}
            </div>
            <div style="font-size:0.92em;font-weight:800;color:var(--teal);">${name} 장비</div>
        </div>

        <div class="equip-grid-2">
            <div>
                <label class="f-label">무기 세트</label>
                <select class="f-select" onchange="saveEquip('set',this.value)">
                    <option value="">선택</option>${setOpts}
                </select>
            </div>
            <div>
                <label class="f-label">속공</label>
                <input class="f-input" type="text" placeholder="예: 81 이상" value="${d.speed||''}" oninput="saveEquip('speed',this.value)">
            </div>
        </div>

        <div class="equip-grid-2" style="margin-top:10px;">
            <div>
                <label class="f-label">무기 메인옵 1</label>
                <select class="f-select" onchange="saveEquip('wpn1',this.value)">
                    <option value="">선택</option>${selOpts(WPN_OPTS,'wpn1')}
                </select>
            </div>
            <div>
                <label class="f-label">방어구 메인옵 1</label>
                <select class="f-select" onchange="saveEquip('arm1',this.value)">
                    <option value="">선택</option>${selOpts(ARM_OPTS,'arm1')}
                </select>
            </div>
        </div>

        <div class="equip-grid-2" style="margin-top:10px;">
            <div>
                <label class="f-label">무기 메인옵 2</label>
                <select class="f-select" onchange="saveEquip('wpn2',this.value)">
                    <option value="">선택</option>${selOpts(WPN_OPTS,'wpn2')}
                </select>
            </div>
            <div>
                <label class="f-label">방어구 메인옵 2</label>
                <select class="f-select" onchange="saveEquip('arm2',this.value)">
                    <option value="">선택</option>${selOpts(ARM_OPTS,'arm2')}
                </select>
            </div>
        </div>

        <div class="equip-grid-2" style="margin-top:10px;">
            <div>
                <label class="f-label">부옵</label>
                <input class="f-input" type="text" placeholder="예: 치명타확률+생명력%" value="${d.sub||''}" oninput="saveEquip('sub',this.value)">
            </div>
            <div>
                <label class="f-label">메모</label>
                <input class="f-input" type="text" placeholder="장비 메모" value="${d.memo||''}" oninput="saveEquip('memo',this.value)">
            </div>
        </div>
    `;
}

function saveEquip(key, val) {
    equipData[activeDefIdx][key] = val;
}

// ──────────────────────────────────
// 스킬 순서
// ──────────────────────────────────
function getAvailableSkills() {
    const skills = [];
    defHeroes.forEach(name => {
        if (!name) return;
        skills.push({ hero: name, num: 1, key: `${name}_1`, img: `${HERO_IMG_PATH}${name}1.webp` });
        skills.push({ hero: name, num: 2, key: `${name}_2`, img: `${HERO_IMG_PATH}${name}2.webp` });
    });
    return skills;
}

function renderSkillGrid(q) {
    const grid = document.getElementById('skillGrid');
    const skills = getAvailableSkills();
    const usedKeys = skillOrder.filter(Boolean).map(s => s.key);

    if (!skills.length) {
        grid.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:0.82em;">방어팀 영웅을 선택하면 스킬이 표시됩니다</div>';
        return;
    }

    const lq = q.toLowerCase();
    const filtered = q ? skills.filter(s => s.hero.toLowerCase().includes(lq)) : skills;

    const grouped = {};
    filtered.forEach(s => {
        if (!grouped[s.hero]) grouped[s.hero] = [];
        grouped[s.hero].push(s);
    });

    grid.innerHTML = Object.entries(grouped).map(([hero, heroSkills]) => {
        const skillsHtml = heroSkills.map(s => {
            const used = usedKeys.includes(s.key);
            const orderIdx = skillOrder.findIndex(o => o && o.key === s.key);
            return `
            <div onclick="toggleSkill('${s.key}','${s.hero}',${s.num},'${s.img}')"
                 style="position:relative;width:52px;height:52px;border-radius:10px;overflow:hidden;border:2px solid ${used ? '#b8860b' : 'var(--border)'};cursor:pointer;background:var(--bg);transition:all 0.18s;">
                <img src="${s.img}" style="width:100%;height:100%;object-fit:cover;"
                     onerror="this.parentElement.style.background='var(--teal-soft)'">
                ${used ? `<div style="position:absolute;inset:0;background:rgba(184,134,11,0.25);display:flex;align-items:center;justify-content:center;">

                </div>` : ''}

        }).join('');

        // S2 위, S1 아래 순서로 정렬
        const sortedSkills = [...heroSkills].sort((a, b) => b.num - a.num);
        const skillsVertical = sortedSkills.map(s => {
            const used = usedKeys.includes(s.key);
            const orderIdx = skillOrder.findIndex(o => o && o.key === s.key);
            return `<div onclick="toggleSkill('${s.key}','${s.hero}',${s.num},'${s.img}')"
                 style="position:relative;width:52px;height:52px;border-radius:10px;overflow:hidden;border:2px solid ${used ? '#b8860b' : 'var(--border)'};cursor:pointer;background:var(--bg);transition:all 0.18s;">
                <img src="${s.img}" style="width:100%;height:100%;object-fit:cover;"
                     onerror="this.parentElement.style.background='var(--teal-soft)'">

                </div>
                <div style="display:flex;flex-direction:column;gap:4px;">
                    ${skillsVertical}
                </div>
            </div>
            <div style="font-size:0.72em;font-weight:700;color:var(--text-sub);text-align:center;">${hero}</div>
        </div>`;
    }).join('');
}

function toggleSkill(key, hero, num, img) {
    const existIdx = skillOrder.findIndex(s => s && s.key === key);
    if (existIdx !== -1) {
        skillOrder[existIdx] = null;
        skillOrder = skillOrder.filter(Boolean);
        while (skillOrder.length < 3) skillOrder.push(null);
    } else {
        const emptyIdx = skillOrder.findIndex(s => s === null);
        if (emptyIdx === -1) return;
        skillOrder[emptyIdx] = { key, hero, num, img };
    }
    renderSkillSlots();
    renderSkillGrid('');
}

function addSkill(key, hero, num, img) {
    toggleSkill(key, hero, num, img);
}

function clearSkillSlot(idx) {
    if (!skillOrder[idx]) return;
    skillOrder[idx] = null;
    skillOrder = skillOrder.filter(Boolean);
    while (skillOrder.length < 3) skillOrder.push(null);
    renderSkillSlots();
    renderSkillGrid('');
}

function renderSkillSlots() {
    [0,1,2].forEach(i => {
        const slot = document.getElementById(`skillSlot${i}`);
        const s = skillOrder[i];
        if (s) {
            slot.className = 'skill-order-img filled';
            slot.innerHTML = `<img src="${s.img}" alt="${s.hero} 스킬${s.num}"
                onerror="this.parentElement.innerHTML='<span style=\\'font-size:0.6em;text-align:center;\\'>${s.hero}<br>S${s.num}</span>'">
                <button class="del-skill" onclick="event.stopPropagation();clearSkillSlot(${i})">×</button>`;
        } else {
            slot.className = 'skill-order-img';
            slot.innerHTML = `<span>?</span><button class="del-skill">×</button>`;
        }
    });
}

// 펫
// ──────────────────────────────────
function renderPetGrid() {
    const grid = document.getElementById('petGrid');
    grid.innerHTML = PET_LIST.map(name => {
        const sel = selectedPets.includes(name);
        return `<div class="pet-item" onclick="addPet('${name}')">
            <div class="pet-item-img ${sel ? 'selected' : ''}">
                <img src="${PET_IMG_PATH}${name}.png" alt="${name}"
                     onerror="this.closest('.pet-item').style.display='none'">
            </div>
            <div class="pet-item-name">${name}</div>
        </div>`;
    }).join('');
}

function addPet(name) {
    if (selectedPets.includes(name)) return;
    const idx = selectedPets.findIndex(p => p === null);
    if (idx === -1) return;
    selectedPets[idx] = name;
    renderPetSlots();
    renderPetGrid();
}

function clearPet(idx) {
    if (!selectedPets[idx]) return;
    selectedPets[idx] = null;
    selectedPets = selectedPets.filter(Boolean);
    while (selectedPets.length < 3) selectedPets.push(null);
    renderPetSlots();
    renderPetGrid();
}

function renderPetSlots() {
    [0,1,2].forEach(i => {
        const slot = document.getElementById(`petSlot${i}`);
        const name = selectedPets[i];
        if (name) {
            slot.className = 'pet-slot filled';
            slot.innerHTML = `<img src="${PET_IMG_PATH}${name}.png" alt="${name}"
                onerror="this.style.background='var(--teal-soft)'">
                <button class="del-pet" onclick="event.stopPropagation();clearPet(${i})">×</button>`;
        } else {
            slot.className = 'pet-slot';
            slot.innerHTML = `<span>+</span><button class="del-pet" onclick="clearPet(${i})">×</button>`;
        }
    });
    document.getElementById('petCount').textContent = `${selectedPets.filter(Boolean).length} / 3`;
}

async function saveGuide() {
    if (!currentUser) { alert('로그인이 필요합니다.'); return; }
    if (currentUser.role !== 'admin' && !editingDefId) {
        alert('방어팀 등록은 관리자만 가능합니다.');
        switchSub('list'); return;
    }
    const name = document.getElementById('fName').value.trim();
    if (!name) { alert('방어팀 이름을 입력해주세요.'); return; }
    if (defHeroes.some(h => !h)) { alert('방어팀 영웅 3명을 모두 선택해주세요.'); return; }
    if (!selectedPets.filter(Boolean).length) { alert('펫을 최소 1개 이상 선택해주세요.'); return; }

    const btn = document.getElementById('dBtnSubmit');
    if (!btn) return;
    const isEditing = !!editingDefId;
    btn.textContent = '저장중...'; btn.disabled = true;

    try {
        const data = {
            name,
            speedCondition: document.querySelector('input[name="speedDef"]:checked')?.value,
            memo: document.getElementById('fMemo').value,
            detail: document.getElementById('fDetail').value,
            defenseTeam: [...defHeroes],
            equipData: JSON.parse(JSON.stringify(equipData)),
            skillOrder: skillOrder.filter(Boolean).map(s => ({ hero: s.hero, num: s.num, key: s.key })),
            pets: selectedPets.filter(Boolean),
        };

        if (isEditing) {
            await updateDoc(doc(db, 'defense_strategies', editingDefId), { ...data, updatedAt: serverTimestamp() });
            alert('방어팀이 수정되었습니다! ✅');
            editingDefId = null;
        } else {
            await fbSave(data);
            alert('방어팀이 등록되었습니다! ✅');
        }
        switchSub('list');
        await loadGuides();
    } catch(e) {
        console.error(e);
        alert('저장 오류: ' + e.message);
    } finally {
        if (btn) { btn.textContent = isEditing ? '✅ 방어팀 수정하기' : '✅ 방어팀 등록하기'; btn.disabled = false; }
    }
}

                ${sk.length ? `<div style="margin-bottom:18px;"><div style="font-size:0.72em;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:#b8860b;margin-bottom:10px;">⭐ 스킬 순서</div><div style="display:flex;align-items:flex-end;gap:4px;flex-wrap:wrap;">${skillCards}</div></div>` : ''}
                ${pets.length ? `<div style="margin-bottom:18px;"><div style="font-size:0.72em;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;">🐾 펫</div><div style="display:flex;align-items:flex-start;gap:0;flex-wrap:wrap;">${petChips}</div></div>` : ''}
                ${g.memo ? `<div style="margin-bottom:14px;"><div style="font-size:0.72em;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">📌 메모</div><div style="font-size:0.83em;color:var(--text-sub);line-height:1.6;">${g.memo}</div></div>` : ''}
                ${g.detail ? `<div style="margin-bottom:18px;"><div style="font-size:0.72em;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;">💡 방어 디테일</div><div style="font-size:0.83em;color:var(--text-sub);line-height:1.7;white-space:pre-wrap;">${g.detail}</div></div>` : ''}
                <!-- 댓글 -->
                <div style="border-top:1px solid var(--border);padding-top:14px;">
                    <div style="font-size:0.78em;font-weight:700;color:var(--text);margin-bottom:10px;">💬 댓글 (${comments.length})</div>
                    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:10px;">${commentsHtml || '<p style="font-size:0.78em;color:var(--text-muted);padding:4px 0;">첫 댓글을 남겨보세요!</p>'}</div>
                    <div style="display:flex;gap:8px;">
                        <input id="dcinput-${g.id}" type="text" placeholder="댓글을 입력하세요..."
                               style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:9px;font-size:0.84em;font-family:inherit;"
                               onkeydown="if(event.key==='Enter') addDefComment('${g.id}')">
                        <button onclick="addDefComment('${g.id}')" style="padding:8px 16px;background:var(--teal-soft);color:var(--teal);border:none;border-radius:9px;font-size:0.82em;font-weight:700;cursor:pointer;white-space:nowrap;">등록</button>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleDetail(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const idx = id.split('-')[1];
    const arrow = document.getElementById(`dtoggle-${idx}`);
    const isOpen = el.style.display !== 'none';
    el.style.display = isOpen ? 'none' : 'block';
    if (arrow) arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
};

async function deleteDefGuide(id) {
    if (!confirm('이 방어팀을 삭제하시겠습니까?')) return;
    try { await deleteDoc(doc(db, 'defense_strategies', id)); alert('삭제되었습니다.'); await loadGuides(); }
    catch(e) { alert('삭제 오류: ' + e.message); }
};

async function editDefGuide(id) {
    const g = allDefGuides.find(x => x.id === id);
    if (!g) return;
    editingDefId = id;
    switchSub('form');
    await new Promise(r => setTimeout(r, 50));
    document.getElementById('fName').value = g.name || '';
    if (document.getElementById('fMemo')) document.getElementById('fMemo').value = g.memo || '';
    if (document.getElementById('fDetail')) document.getElementById('fDetail').value = g.detail || '';
    const radio = document.querySelector(`input[name="speedDef"][value="${g.speedCondition||'속내실'}"]`);
    if (radio) radio.checked = true;
    const heroes = g.defenseTeam || [];
    const eq = g.equipData || [{},{},{}];
    heroes.forEach((h, i) => {
        if (!h) return;
        defHeroes[i] = h;
        const slot = document.getElementById(`defSlot${i}`);
        const nameEl = document.getElementById(`defSlotName${i}`);
        if (slot) { slot.innerHTML = heroImg(h); slot.className = 'hero-slot-img selected'; }
        if (nameEl) nameEl.textContent = h;
        equipData[i] = { set:eq[i]?.set||'', speed:eq[i]?.speed||'', wpn1:eq[i]?.wpn1||'', wpn2:eq[i]?.wpn2||'', arm1:eq[i]?.arm1||'', arm2:eq[i]?.arm2||'', sub:eq[i]?.sub||'', memo:eq[i]?.memo||'' };
    });
    renderEquipTabs();
    if (defHeroes[0]) { activeDefIdx = 0; setActiveHero(0); }
    renderSkillGrid('');
    skillOrder = [null, null, null];
    (g.skillOrder || []).forEach((s, i) => { skillOrder[i] = { key: s.key||`${s.hero}_${s.num}`, hero:s.hero, num:s.num, img:`${HERO_IMG_PATH}${s.hero}${s.num}.webp` }; });
    renderSkillSlots(); renderSkillGrid('');
    selectedPets = [null, null, null];
    (g.pets || []).forEach((name, i) => { selectedPets[i] = name; });
    renderPetSlots(); renderPetGrid();
    const btn = document.getElementById('dBtnSubmit');
    if (btn) btn.textContent = '✅ 방어팀 수정하기';
};

async function addDefComment(guideId) {
    const input = document.getElementById(`dcinput-${guideId}`);
    const text = input.value.trim();
    if (!text) return;
    try {
        const gRef = doc(db, 'defense_strategies', guideId);
        const gSnap = await getDoc(gRef);
        const comments = gSnap.data().comments || [];
        comments.push({ id: Date.now().toString(), text, author: currentUser.nickname, uid: currentUser.uid, date: `${new Date().getMonth()+1}.${new Date().getDate()}` });
        await updateDoc(gRef, { comments });
        input.value = '';
        await loadGuides();
    } catch(e) { alert('댓글 등록 오류: ' + e.message); }
};

function startEditDefComment(guideId, commentId) {
    const textEl = document.getElementById(`dcmtext-${commentId}`);
    const editEl = document.getElementById(`dcmedit-${commentId}`);
    const inputEl = document.getElementById(`dcminput-${commentId}`);
    if (!textEl || !editEl || !inputEl) return;
    inputEl.value = textEl.innerText;
    textEl.style.display = 'none'; editEl.style.display = 'block'; inputEl.focus();
};

function cancelEditDefComment(commentId) {
    const textEl = document.getElementById(`dcmtext-${commentId}`);
    const editEl = document.getElementById(`dcmedit-${commentId}`);
    if (textEl) textEl.style.display = 'block';
    if (editEl) editEl.style.display = 'none';
};

async function saveEditDefComment(guideId, commentId) {
    const inputEl = document.getElementById(`dcminput-${commentId}`);
    const newText = inputEl.value.trim();
    if (!newText) { alert('내용을 입력해주세요.'); return; }
    try {
        const gRef = doc(db, 'defense_strategies', guideId);
        const gSnap = await getDoc(gRef);
        const comments = (gSnap.data().comments || []).map(c => c.id === commentId ? { ...c, text: newText } : c);
        await updateDoc(gRef, { comments });
        await loadGuides();
    } catch(e) { alert('수정 오류: ' + e.message); }
};

async function deleteDefComment(guideId, commentId) {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
        const gRef = doc(db, 'defense_strategies', guideId);
        const gSnap = await getDoc(gRef);
        const comments = (gSnap.data().comments || []).filter(c => c.id !== commentId);
        await updateDoc(gRef, { comments });
        await loadGuides();
    } catch(e) { alert('삭제 오류: ' + e.message); }
};

async function fbSave(data) {
    await addDoc(collection(db, 'defense_strategies'), {
        ...data,
        author: currentUser.nickname,
        authorUid: currentUser.uid,
        createdAt: serverTimestamp(),
        comments: []
    });
}

async function fbLoad() {
    try {
        const q = query(collection(db, 'defense_strategies'), orderBy('createdAt','desc'));
        const snap = await getDocs(q);
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
        return list;
    } catch(e) {
        const snap = await getDocs(collection(db, 'defense_strategies'));
        const list = [];
        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
        return list;
    }
}



// ── 인증 ──
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { await signOut(auth); window.location.href = 'index.html'; return; }
    const data = snap.data();
    if (data.role === 'pending') { await signOut(auth); window.location.href = 'index.html'; return; }
    currentUser = { uid: user.uid, ...data };
    document.getElementById('sidebarName').textContent = currentUser.nickname;
    document.getElementById('sidebarRole').textContent = currentUser.role === 'admin' ? '👑 관리자' : '👤 멤버';
    if (currentUser.role === 'admin') {
        const adminEl = document.getElementById('adminSection');
        if (adminEl) adminEl.style.display = '';
    } else {
        // 일반 멤버 - 등록 버튼/탭 숨기기
        const registerBtn = document.getElementById('defSubForm');
        if (registerBtn) registerBtn.style.display = 'none';
        const addBtn = document.querySelector('.btn-add');
        if (addBtn) addBtn.style.display = 'none';
    }
    await loadGuides();
});

window.handleLogout = async () => {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    await signOut(auth); window.location.href = 'index.html';
};
