<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리 - 귀요미 길드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f5f9; --white: #ffffff;
            --primary: #7c5cbf; --primary-soft: #ede8f8;
            --secondary: #e8609a; --secondary-soft: #fde8f2;
            --grad: linear-gradient(135deg, #7c5cbf, #e8609a);
            --text: #1a1a2e; --text-sub: #5a5a7a; --text-muted: #9898b8;
            --border: #e8e8f0; --shadow-md: 0 4px 20px rgba(124,92,191,0.10);
            --sidebar-w: 240px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

        /* 사이드바 */
        .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--white); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 100; transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
        .sidebar-logo { padding: 24px 20px 18px; border-bottom: 1px solid var(--border); }
        .logo-wrap { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: var(--grad); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1em; flex-shrink: 0; }
        .logo-name { font-size: 0.95em; font-weight: 800; color: var(--primary); }
        .logo-sub  { font-size: 0.68em; color: var(--text-muted); }
        .sidebar-user { margin: 14px 12px; padding: 12px 14px; background: var(--primary-soft); border-radius: 12px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; background: var(--grad); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85em; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 0.85em; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.68em; color: var(--primary); font-weight: 600; margin-top: 1px; }
        .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8em; padding: 4px 6px; border-radius: 6px; }
        .logout-btn:hover { color: var(--secondary); }
        .sidebar-nav { flex: 1; padding: 8px 12px; overflow-y: auto; }
        .nav-label { font-size: 0.62em; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 14px 10px 6px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 0.875em; font-weight: 600; color: var(--text-sub); text-decoration: none; transition: all 0.18s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--bg); color: var(--primary); }
        .nav-item.active { background: var(--primary-soft); color: var(--primary); }
        .nav-icon { font-size: 1em; width: 20px; text-align: center; flex-shrink: 0; }
        .sidebar-bottom { padding: 12px; border-top: 1px solid var(--border); }
        .admin-link { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; font-size: 0.875em; font-weight: 600; color: var(--secondary); text-decoration: none; background: var(--secondary-soft); }
        .admin-link:hover { background: #fbd5e8; }

        /* 메인 */
        .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { height: 56px; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar-title { font-size: 0.9em; font-weight: 700; }
        .topbar-date  { font-size: 0.78em; color: var(--text-muted); }
        .guild-chip { padding: 5px 12px; background: var(--primary-soft); border-radius: 20px; font-size: 0.78em; font-weight: 700; color: var(--primary); }
        .content { padding: 28px 32px; flex: 1; }

        .page-hd { margin-bottom: 22px; }
        .page-hd h1 { font-size: 1.3em; font-weight: 800; }
        .page-hd p  { font-size: 0.8em; color: var(--text-muted); margin-top: 3px; }

        /* 통계 카드 */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 22px; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.15em; flex-shrink: 0; }
        .si-purple { background: var(--primary-soft); }
        .si-pink   { background: var(--secondary-soft); }
        .si-gold   { background: #fef7e6; }
        .stat-val  { font-size: 1.6em; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-lbl  { font-size: 0.73em; color: var(--text-muted); margin-top: 3px; }

        /* 테이블 패널 */
        .panel { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .panel-hd { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .panel-hd-title { font-size: 0.88em; font-weight: 700; }

        .member-table { width: 100%; border-collapse: collapse; }
        .member-table th { padding: 11px 18px; text-align: left; font-size: 0.75em; font-weight: 700; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); }
        .member-table td { padding: 13px 18px; font-size: 0.84em; border-bottom: 1px solid var(--border); }
        .member-table tbody tr:last-child td { border-bottom: none; }
        .member-table tbody tr:hover { background: #fafafa; }
        .member-table tr.me-row td { background: rgba(124,92,191,0.03); }

        /* 뱃지 */
        .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.72em; font-weight: 700; }
        .badge-admin   { background: var(--secondary-soft); color: var(--secondary); }
        .badge-member  { background: var(--primary-soft); color: var(--primary); }
        .badge-pending { background: #fff7e6; color: #d48806; }

        /* 권한 변경 셀렉트 */
        .role-select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 7px; font-size: 0.78em; font-family: inherit; background: var(--white); cursor: pointer; color: var(--text); }
        .role-select:focus { outline: none; border-color: var(--primary); }

        /* 버튼 */
        .btn-sm { padding: 4px 12px; border-radius: 7px; font-size: 0.76em; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all 0.18s; }
        .btn-save { background: var(--primary-soft); color: var(--primary); }
        .btn-save:hover { background: #ddd4f5; }
        .btn-del  { background: #fdeaea; color: #d94f4f; margin-left: 5px; }
        .btn-del:hover  { background: #fbd5d5; }

        .empty-row { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.84em; }

        /* 모바일 */
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 90; }
        .sidebar-overlay.open { display: block; }
        .hamburger { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; background: var(--white); border: 1px solid var(--border); border-radius: 9px; padding: 9px; cursor: pointer; flex-direction: column; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .hamburger span { display: block; width: 17px; height: 2px; background: var(--text-sub); border-radius: 2px; }

        @media (max-width: 860px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.12); }
            .main { margin-left: 0; }
            .hamburger { display: flex; }
            .topbar { padding: 0 16px 0 52px; }
            .content { padding: 20px 16px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .member-table th:nth-child(3), .member-table td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-wrap">
            <div class="logo-icon">🐰</div>
            <div><div class="logo-name">귀요미 길드</div><div class="logo-sub">세븐나이츠 공략집</div></div>
        </div>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar">🌸</div>
        <div class="user-info">
            <div class="user-name" id="sidebarName">로딩중...</div>
            <div class="user-role" id="sidebarRole">👑 관리자</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">↩</button>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">메뉴</div>
        <a href="main.html" class="nav-item"><span class="nav-icon">🏠</span> 홈</a>
        <div class="nav-label">공략</div>
        <a href="guildwar.html" class="nav-item"><span class="nav-icon">⚔️</span> 길드전</a>
        <a href="siege.html" class="nav-item"><span class="nav-icon">🏰</span> 공성전</a>
        <a href="expedition.html" class="nav-item"><span class="nav-icon">🌟</span> 강림원정대</a>
        <div class="nav-label">커뮤니티</div>
        <a href="board.html" class="nav-item"><span class="nav-icon">📋</span> 게시판</a>
    </nav>
    <div class="sidebar-bottom">
        <a href="admin.html" class="admin-link"><span>👑</span> 회원 관리</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div>
            <div class="topbar-title">회원 관리</div>
            <div class="topbar-date" id="topDate"></div>
        </div>
        <div class="guild-chip">🐰 귀요미 길드</div>
    </div>

    <div class="content">
        <div class="page-hd">
            <h1>👥 회원 관리</h1>
            <p>길드원 권한을 관리하세요</p>
        </div>

        <!-- 통계 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon si-purple">👥</div>
                <div><div class="stat-val" id="statTotal">-</div><div class="stat-lbl">전체 회원</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon si-pink">👑</div>
                <div><div class="stat-val" id="statAdmin">-</div><div class="stat-lbl">관리자</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon si-gold">⏳</div>
                <div><div class="stat-val" id="statPending">-</div><div class="stat-lbl">승인 대기</div></div>
            </div>
        </div>

        <!-- 회원 테이블 -->
        <div class="panel">
            <div class="panel-hd">
                <div class="panel-hd-title">회원 목록</div>
            </div>
            <table class="member-table">
                <thead>
                    <tr>
                        <th style="width:50px; text-align:center;">#</th>
                        <th>닉네임</th>
                        <th>이메일</th>
                        <th>가입일</th>
                        <th style="text-align:center;">현재 권한</th>
                        <th style="text-align:center;">권한 변경</th>
                        <th style="text-align:center;">관리</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    <tr><td colspan="7" class="empty-row">로딩중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB = {
    apiKey: "AIzaSyAIuUCCt5RfN5Jv9THi3-OAn1F4xJ7TH4U",
    authDomain: "gyuomi-guild.firebaseapp.com",
    projectId: "gyuomi-guild",
    storageBucket: "gyuomi-guild.firebasestorage.app",
    messagingSenderId: "43293575259",
    appId: "1:43293575259:web:2ac8bd0dfecda6a2be177e"
};

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

// ✅ 미리보기 모드 (배포 시 false로 변경)
const PREVIEW = false;
const PREVIEW_USER = { uid: 'preview', nickname: '미리보기', role: 'admin' };

const days = ['일','월','화','수','목','금','토'], now = new Date();
document.getElementById('topDate').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;

let me = null;
let allUsers = [];

if (PREVIEW) {
    me = PREVIEW_USER;
    document.getElementById('sidebarName').textContent = me.nickname;
    document.getElementById('sidebarRole').textContent = '👑 관리자';
    // 더미 데이터로 미리보기
    allUsers = [
        { uid: 'preview', nickname: '미리보기', email: 'preview@test.com', role: 'admin', createdAt: new Date().toISOString() },
        { uid: 'user1',   nickname: '길드원A',  email: 'usera@test.com',   role: 'member', createdAt: new Date().toISOString() },
        { uid: 'user2',   nickname: '길드원B',  email: 'userb@test.com',   role: 'member', createdAt: new Date().toISOString() },
        { uid: 'user3',   nickname: '대기자',   email: 'wait@test.com',    role: 'pending', createdAt: new Date().toISOString() },
    ];
    renderStats();
    renderTable();
} else {
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { await signOut(auth); window.location.href = 'index.html'; return; }
        const data = snap.data();
        if (data.role !== 'admin') { alert('관리자만 접근 가능합니다.'); window.location.href = 'main.html'; return; }
        me = { uid: user.uid, ...data };
        document.getElementById('sidebarName').textContent = me.nickname;
        document.getElementById('sidebarRole').textContent = '👑 관리자';
        await loadUsers();
    });
}

async function loadUsers() {
    try {
        const snap = await getDocs(collection(db, 'users'));
        allUsers = [];
        snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));
        allUsers.sort((a, b) => {
            const order = { pending: 0, admin: 1, member: 2 };
            if (order[a.role] !== order[b.role]) return order[a.role] - order[b.role];
            return new Date(a.createdAt) - new Date(b.createdAt);
        });
        renderStats();
        renderTable();
    } catch(e) {
        console.error(e);
        document.getElementById('memberTableBody').innerHTML = '<tr><td colspan="7" class="empty-row">불러오기 실패</td></tr>';
    }
}

function renderStats() {
    document.getElementById('statTotal').textContent   = allUsers.filter(u => u.role !== 'pending').length;
    document.getElementById('statAdmin').textContent   = allUsers.filter(u => u.role === 'admin').length;
    document.getElementById('statPending').textContent = allUsers.filter(u => u.role === 'pending').length;
}

function renderTable() {
    const body = document.getElementById('memberTableBody');
    if (!allUsers.length) {
        body.innerHTML = '<tr><td colspan="7" class="empty-row">등록된 회원이 없습니다.</td></tr>';
        return;
    }

    const badgeMap = {
        admin:   '<span class="badge badge-admin">👑 관리자</span>',
        member:  '<span class="badge badge-member">👤 멤버</span>',
        pending: '<span class="badge badge-pending">⏳ 승인대기</span>',
    };

    body.innerHTML = allUsers.map((u, i) => {
        const isMe = me && u.uid === me.uid;
        const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ko-KR') : '-';
        return `
        <tr class="${isMe ? 'me-row' : ''}">
            <td style="text-align:center;color:var(--text-muted);">${i+1}</td>
            <td style="font-weight:${isMe ? '700' : '500'};">${u.nickname}${isMe ? ' <span style="color:var(--primary);font-size:0.8em;">(나)</span>' : ''}</td>
            <td style="color:var(--text-muted);">${u.email}</td>
            <td style="color:var(--text-muted);">${date}</td>
            <td style="text-align:center;">${badgeMap[u.role] || u.role}</td>
            <td style="text-align:center;">
                ${!isMe ? `
                <select class="role-select" id="roleSelect-${u.uid}">
                    <option value="pending"  ${u.role==='pending' ?'selected':''}>⏳ 승인대기</option>
                    <option value="member"   ${u.role==='member'  ?'selected':''}>👤 멤버</option>
                    <option value="admin"    ${u.role==='admin'   ?'selected':''}>👑 관리자</option>
                </select>` : '<span style="color:var(--text-muted);font-size:0.8em;">-</span>'}
            </td>
            <td style="text-align:center;">
                ${!isMe ? `
                <button class="btn-sm btn-save" onclick="changeRole('${u.uid}','${u.nickname}')">변경</button>
                <button class="btn-sm btn-del"  onclick="deleteMember('${u.uid}','${u.nickname}')">삭제</button>
                ` : '<span style="color:var(--text-muted);font-size:0.8em;">-</span>'}
            </td>
        </tr>`;
    }).join('');
}

window.changeRole = async function(uid, nickname) {
    if (PREVIEW) { alert('미리보기 모드에서는 실제 변경이 되지 않습니다.'); return; }
    const newRole = document.getElementById(`roleSelect-${uid}`).value;
    const roleText = { pending:'승인대기', member:'멤버', admin:'관리자' };
    if (!confirm(`${nickname}님의 권한을 "${roleText[newRole]}"(으)로 변경하시겠습니까?`)) return;
    try {
        await updateDoc(doc(db, 'users', uid), { role: newRole });
        alert('권한이 변경되었습니다.');
        await loadUsers();
    } catch(e) { alert('변경 오류: ' + e.message); }
};

window.deleteMember = async function(uid, nickname) {
    if (PREVIEW) { alert('미리보기 모드에서는 실제 삭제가 되지 않습니다.'); return; }
    if (!confirm(`${nickname}님을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
    try {
        await deleteDoc(doc(db, 'users', uid));
        alert('삭제되었습니다.');
        await loadUsers();
    } catch(e) { alert('삭제 오류: ' + e.message); }
};

window.handleLogout = async () => {
    if (PREVIEW) { window.location.href = 'index.html'; return; }
    if (!confirm('로그아웃 하시겠습니까?')) return;
    await signOut(auth);
    window.location.href = 'index.html';
};
</script>

<script>
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeSidebar()  { document.getElementById('sidebar').classList.remove('open');  document.getElementById('overlay').classList.remove('open'); }
</script>
</body>
</html>
